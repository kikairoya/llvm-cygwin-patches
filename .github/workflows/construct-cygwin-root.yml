name: Construct Cygwin Filesystem
on:
  workflow_dispatch:
    inputs:
      clean-install:
        description: "Don't use existing install cache"
        required: false
        type: boolean

jobs:
  do-update:
    runs-on: windows-latest
    concurrency:
      group: construct-cygwin

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: update Cygwin
        id: cygwin
        uses: ./.github/actions/prepare-cygwin-root
        with:
          skip-update: false
          allow-test-packages: false
          clean-install: ${{ inputs.clean-install && 'true' || '' }}
      - name: show packages
        run: |
          ${{ steps.cygwin.outputs.root }}\bin\cat.exe /etc/setup/installed.db
        shell: cmd
